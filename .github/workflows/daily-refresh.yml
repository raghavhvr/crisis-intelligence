name: Crisis Pulse — Daily Data Refresh

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 09:00 GST every day
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  fetch-trends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytrends pandas

      - name: Run data collector
        run: python scripts/collect.py

      - name: Commit and push updated data
        run: |
          git config user.name  "Crisis Pulse Bot"
          git config user.email "bot@crisis-pulse"
          git add public/pulse_data.json
          git diff --staged --quiet || git commit -m "chore: daily pulse data refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
